name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release metadata
        id: meta
        shell: pwsh
        run: |
          $desktopPackage = Get-Content "apps/desktop/package.json" -Raw | ConvertFrom-Json
          $tauriConfig = Get-Content "apps/desktop/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          $version = "$($tauriConfig.version)".Trim()

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Missing version in apps/desktop/src-tauri/tauri.conf.json"
            exit 1
          }

          if ($desktopPackage.version -ne $version) {
            Write-Error "apps/desktop/package.json version ($($desktopPackage.version)) does not match tauri.conf.json version ($version)."
            exit 1
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            Write-Error "Version '$version' is not a valid release version. Use semver like 0.1.0."
            exit 1
          }

          $tag = "v$version"
          if ("${{ github.event_name }}" -eq "push" -and "${{ github.ref_name }}" -ne $tag) {
            Write-Error "Git tag '${{ github.ref_name }}' does not match app version '$version' (expected '$tag')."
            exit 1
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=See the Unseen $tag" >> $env:GITHUB_OUTPUT

      - name: Typecheck desktop
        run: pnpm desktop:check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseBody: |
            Privacy-first desktop notepad with sliding protection window.

            Windows build attached below as an MSI installer.

            Security note: this app is not code-signed yet, so Windows SmartScreen may show an "unknown publisher" warning.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          uploadUpdaterJson: false
          args: --bundles msi
