name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version — must match tauri.conf.json (e.g. 0.1.2)'
        required: true
        type: string
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@v4
        with:
          version: 10.13.1

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target
          cache-on-failure: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release metadata
        id: meta
        shell: pwsh
        run: |
          # Determine the intended version
          if ("${{ github.event_name }}" -eq "push") {
            # Version comes from the pushed git tag (e.g. v0.1.2 → 0.1.2)
            $version = "${{ github.ref_name }}".TrimStart("v")
          } else {
            # Version comes from the manual dispatch input
            $version = "${{ inputs.version }}".Trim()
          }

          if ([string]::IsNullOrWhiteSpace($version)) {
            Write-Error "Could not determine release version."
            exit 1
          }

          if ($version -notmatch '^\d+\.\d+\.\d+([.-][0-9A-Za-z.-]+)?$') {
            Write-Error "Version '$version' is not valid semver (e.g. 0.1.2)."
            exit 1
          }

          # Validate version matches tauri.conf.json
          $tauriConfig = Get-Content "apps/desktop/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json
          if ($tauriConfig.version -ne $version) {
            Write-Error "Version mismatch: input/tag is '$version' but tauri.conf.json has '$($tauriConfig.version)'. Bump the version in the config files first."
            exit 1
          }

          # Validate version matches package.json
          $pkg = Get-Content "apps/desktop/package.json" -Raw | ConvertFrom-Json
          if ($pkg.version -ne $version) {
            Write-Error "Version mismatch: apps/desktop/package.json has '$($pkg.version)' but expected '$version'."
            exit 1
          }

          $tag = "v$version"
          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "release_name=See the Unseen $tag" >> $env:GITHUB_OUTPUT

      - name: Typecheck desktop
        run: pnpm desktop:check

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          tagName: ${{ steps.meta.outputs.tag }}
          releaseName: ${{ steps.meta.outputs.release_name }}
          releaseBody: |
            Privacy-first desktop notepad with sliding protection window.

            Windows build attached below as an MSI installer.

            Security note: this app is not code-signed yet, so Windows SmartScreen may show an "unknown publisher" warning.
          releaseCommitish: ${{ github.sha }}
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          uploadUpdaterJson: false
          args: --bundles msi
